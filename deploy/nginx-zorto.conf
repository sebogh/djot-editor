# Add this inside the existing `server { ... }` block that handles qibli.net.
# The trailing slash on `proxy_pass` is required: it strips the /zorto/ prefix
# before forwarding so Go sees requests at / and /api/... as it expects.

location = /zorto {
    return 301 /zorto/;
}

location /zorto/ {
    proxy_pass http://127.0.0.1:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Match the server's 1 MiB share-payload cap.
    client_max_body_size 1m;
}
