<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Zorto</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="./z_logo_16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./z_logo_32x32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="./z_logo_64x64.png" />
    <link rel="icon" type="image/png" sizes="128x128" href="./z_logo_128x128.png" />
    <link rel="apple-touch-icon" sizes="256x256" href="./z_logo_256x256.png" />
    <script type="module" crossorigin src="./assets/index-YMJSkF1O.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DCNQWSAI.css">
  </head>
  <body>
    <div id="toolbar">
      <input id="title" type="text" placeholder="Untitled" aria-label="Document title" />
      <div class="toolbar-actions">
        <select id="theme-select" aria-label="Theme">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
        <label>
          <input id="toggle-wrap" type="checkbox" role="switch" checked />
          Wrap
        </label>
        <label>
          <input id="toggle-preview" type="checkbox" role="switch" />
          Preview
        </label>
        <button id="clear" type="button" class="outline">Clear</button>
        <button id="share" type="button" class="outline">Share</button>
        <button id="download" type="button" class="outline">Download</button>
        <button id="auth-signin" type="button" class="outline" hidden>Sign in</button>
        <details class="dropdown" id="auth-menu" hidden>
          <summary id="auth-summary"></summary>
          <ul>
            <li><a href="#" id="auth-logout">Logout</a></li>
          </ul>
        </details>
      </div>
    </div>
    <div id="workspace">
      <div id="editor"></div>
      <div id="preview" hidden></div>
    </div>
  </body>
</html>
